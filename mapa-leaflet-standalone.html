<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Climate Options - Mapa de Proyectos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" integrity="sha512-h9FcoyWjHcOcmEVkxOfTLnmZFWIH0iZhZT1H2TbOq55xssQGEJHEaIm+PgoUaZbRvQTNTluNOEfb1ZRy6D3BOw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --verde-sage: #6A826E;
            --verde-bosque: #0D301C;
            --coral: #B4665F;
            --arena: #E8E3D1;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: white;
            color: var(--verde-bosque);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .section-title {
            text-align: center;
            font-size: 2.5em;
            font-weight: 800;
            color: var(--verde-bosque);
            margin-bottom: 15px;
        }

        .section-subtitle {
            text-align: center;
            font-size: 1.2em;
            color: var(--verde-sage);
            margin-bottom: 50px;
        }

        .map-container {
            margin-top: 50px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            height: 600px;
            position: relative;
        }

        #projectsMap {
            height: 100%;
            width: 100%;
        }

        /* Estilos personalizados para los popups del mapa */
        .leaflet-popup-content-wrapper {
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
        }

        .project-popup h3 {
            color: var(--verde-bosque);
            font-size: 1.2em;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .project-popup .location {
            color: var(--verde-sage);
            font-size: 0.9em;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .project-popup .description {
            color: var(--verde-bosque);
            font-size: 0.95em;
            line-height: 1.5;
        }

        .project-popup .category {
            display: inline-block;
            background: var(--arena);
            color: var(--verde-bosque);
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.8em;
            margin-top: 10px;
            font-weight: 600;
        }

        @media (max-width: 640px) {
            .map-container {
                height: 400px;
                margin-top: 30px;
            }

            .section-title {
                font-size: 1.8em;
            }

            .section-subtitle {
                font-size: 1em;
            }

            .container {
                padding: 30px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="section-title">Nuestros Proyectos en Centroamérica</h2>
        <p class="section-subtitle">Impacto real en comunidades de Guatemala, El Salvador y Honduras</p>
        
        <div class="map-container">
            <div id="projectsMap"></div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js" integrity="sha512-BwHfrr4c9kmRkLw6iXFdzcdWV/PGkVgiIyIWLLlTSXzWQzxuSg4DiQUCpauz/EWjgk5TYQqX/kvn9pG1NpYfqg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    
    <script>
        // Esperar a que la página cargue completamente
        window.addEventListener('load', function() {
            // Inicializar el mapa centrado en Centroamérica
            const map = L.map('projectsMap').setView([14.5, -87.5], 7);

            // Agregar capa de OpenStreetMap
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
                maxZoom: 18
            }).addTo(map);

            // Definir icono personalizado con colores de la marca
            const customIcon = L.divIcon({
                className: 'custom-div-icon',
                html: '<div style="background-color: #6A826E; width: 20px; height: 20px; border-radius: 50%; border: 3px solid white; box-shadow: 0 3px 10px rgba(0,0,0,0.3);"></div>',
                iconSize: [26, 26],
                iconAnchor: [13, 13]
            });

            // Proyectos con sus ubicaciones
            const projects = [
                {
                    name: "Gestión de Residuos Sólidos",
                    location: "Cuenca del Motagua, Guatemala",
                    coords: [14.95, -89.5],
                    description: "Implementación de sistemas eficientes para el manejo y tratamiento de residuos sólidos en la cuenca del río Motagua.",
                    category: "Gestión de Reciclaje"
                },
                {
                    name: "Restauración de Bosques",
                    location: "Chalatenango, El Salvador",
                    coords: [14.033, -88.933],
                    description: "Programa de reforestación y recuperación de ecosistemas forestales degradados en la región de Chalatenango.",
                    category: "Restauración"
                },
                {
                    name: "Desplazamiento y Cambio Climático",
                    location: "Honduras",
                    coords: [14.065, -87.172],
                    description: "Estudio y gestión de la movilidad humana causada por eventos climáticos extremos en Honduras.",
                    category: "Movilidad Humana"
                },
                {
                    name: "Diagnóstico de Conflictividad Minera",
                    location: "Choluteca, Honduras",
                    coords: [13.3, -87.2],
                    description: "Análisis de conflictividad por actividades mineras con enfoque de género en Choluteca.",
                    category: "Gobernanza"
                },
                {
                    name: "Diagnóstico de Conflictividad Minera",
                    location: "Santa Bárbara, Honduras",
                    coords: [14.917, -88.233],
                    description: "Análisis de conflictividad por actividades mineras con enfoque de género en Santa Bárbara.",
                    category: "Gobernanza"
                },
                {
                    name: "Diagnóstico de Conflictividad Minera",
                    location: "El Paraíso, Honduras",
                    coords: [13.867, -86.55],
                    description: "Análisis de conflictividad por actividades mineras con enfoque de género en El Paraíso.",
                    category: "Gobernanza"
                },
                {
                    name: "Diagnóstico de Conflictividad Minera",
                    location: "Olancho, Honduras",
                    coords: [14.6, -85.9],
                    description: "Análisis de conflictividad por actividades mineras con enfoque de género en Olancho.",
                    category: "Gobernanza"
                },
                {
                    name: "Diagnóstico de Conflictividad Minera",
                    location: "Colón, Honduras",
                    coords: [15.8, -85.7],
                    description: "Análisis de conflictividad por actividades mineras con enfoque de género en Colón.",
                    category: "Gobernanza"
                }
            ];

            // Agregar marcadores al mapa
            projects.forEach(project => {
                const popupContent = `
                    <div class="project-popup">
                        <h3>${project.name}</h3>
                        <div class="location">📍 ${project.location}</div>
                        <div class="description">${project.description}</div>
                        <span class="category">${project.category}</span>
                    </div>
                `;

                L.marker(project.coords, { icon: customIcon })
                    .addTo(map)
                    .bindPopup(popupContent, {
                        maxWidth: 300,
                        className: 'custom-popup'
                    });
            });

            // Ajustar el mapa para mostrar todos los marcadores
            const group = L.featureGroup(
                projects.map(p => L.marker(p.coords))
            );
            map.fitBounds(group.getBounds().pad(0.1));
        });
    </script>
</body>
</html>
